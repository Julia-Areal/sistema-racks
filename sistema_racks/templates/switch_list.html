{% extends "base.html" %}
{% block title %}Lista de Switches{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Switches</h2>
    <a href="{% url 'switch_create' %}" class="btn btn-success">+ Adicionar Switch</a>
</div>

<div class="accordion" id="switchAccordion">
    {% for switch in switches %}
    <div class="accordion-item">
        <h2 class="accordion-header" id="heading{{ switch.id }}">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#collapse{{ switch.id }}" aria-expanded="false">
                {{ switch.num_patrimonio }} - {{ switch.quantidade_portas }} portas
            </button>
        </h2>
        <div id="collapse{{ switch.id }}" class="accordion-collapse collapse" 
             aria-labelledby="heading{{ switch.id }}" data-bs-parent="#switchAccordion">
            <div class="accordion-body">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Porta</th>
                            <th>Valor</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for porta in switch.portas.all %}
                        <tr>
                            <td>{{ porta.numero }}</td>
                            <td>
                                <form method="post" action="{% url 'porta_update' porta.id %}">
                                    {% csrf_token %}
                                    <input type="text" name="valor" value="{{ porta.valor }}" class="form-control form-control-sm">
                            </td>
                            <td>
                                    <button type="submit" class="btn btn-sm btn-primary">Salvar</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
